limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    server_name portfolio.dblo.net;

    client_max_body_size 35m;

    location /api/auth/register/ {
        deny all;
    }

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/portfolio.dblo.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/portfolio.dblo.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = portfolio.dblo.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name portfolio.dblo.net;
    return 404; # managed by Certbot
}
