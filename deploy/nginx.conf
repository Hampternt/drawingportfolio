limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Gzip compression — shrinks HTML/CSS/JS by ~75% before sending over the wire.
# Without this, every page response is sent uncompressed.
gzip on;
gzip_vary on;           # Tells caches the response varies by Accept-Encoding
gzip_min_length 1024;   # Don't bother compressing tiny responses (not worth the CPU)
gzip_types
    text/html
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;

server {
    server_name portfolio.dblo.net;

    client_max_body_size 35m;

    # SSL session cache — lets returning visitors skip the full TLS handshake.
    # Without this, every new connection renegotiates from scratch (~100ms extra).
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP stapling — server fetches and caches the certificate validity proof,
    # so browsers don't have to make a separate request to the CA on each visit.
    ssl_stapling on;
    ssl_stapling_verify on;

    location /api/auth/register/ {
        deny all;
    }

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files: cache aggressively for 1 year.
    # The filename never changes (no cache-busting hash), so if you update a file
    # you'll need to either rename it or do a hard refresh. This is fine for a
    # hobby site — the gain for return visitors is that CSS/JS/images load from
    # disk (effectively instant) rather than hitting the network at all.
    location /static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/portfolio.dblo.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/portfolio.dblo.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name portfolio.dblo.net;

    # Allow Certbot HTTP-01 renewal challenges through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
