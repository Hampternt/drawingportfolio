<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Portfolio{% endblock %}</title>
  <!-- Pre-warm TLS connection to image CDN so first image loads faster -->
  <link rel="preconnect" href="https://portfolio-images.hel1.your-objectstorage.com" crossorigin>
  <link rel="dns-prefetch" href="https://portfolio-images.hel1.your-objectstorage.com">
  <link rel="stylesheet" href="/static/style.css">
  <!-- Self-hosted HTMX — eliminates DNS lookup + TLS handshake to unpkg.com -->
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/htmx-ext-preload.js" defer></script>
  <script>const IS_ADMIN = {% if is_admin %}true{% else %}false{% endif %};</script>
  <script src="/static/palette.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body hx-boost="true">
  <header>
    <a href="/" class="site-title">Portfolio</a>
    <nav>
      <a href="/artportfolio">Drawing Portfolio</a>
      <a href="/fitness">Fitness</a>
    </nav>
    <button class="palette-hint" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true,bubbles:true}))" aria-label="Open command palette">
      <kbd>Ctrl</kbd><kbd>K</kbd>
    </button>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
