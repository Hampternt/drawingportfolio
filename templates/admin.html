<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Portfolio</title>
  <link rel="preconnect" href="https://portfolio-images.hel1.your-objectstorage.com" crossorigin>
  <link rel="dns-prefetch" href="https://portfolio-images.hel1.your-objectstorage.com">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
  <style>
    .admin-form { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .admin-form textarea { width: 100%; min-height: 80px; padding: 0.5rem; margin: 0.5rem 0; font: inherit; border: 1px solid #ccc; border-radius: 4px; }
    .admin-form input[type=file] { margin: 0.5rem 0; }
    .admin-form button { padding: 0.5rem 1.5rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .admin-post { display: flex; gap: 1rem; align-items: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
    .admin-post img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; }
    .admin-post .info { flex: 1; }
    .delete-btn { background: #c00; color: #fff; border: none; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; }
    #upload-status { margin-top: 0.5rem; color: #555; }
  </style>
  <script>const IS_ADMIN = true;</script>
  <script src="/static/palette.js" defer></script>
</head>
<body hx-boost="true">
  <header>
    <h1>Portfolio Admin</h1>
    <a href="/">View site</a>
    <form action="/api/auth/logout" method="post" style="display:inline">
      <button type="submit">Log out</button>
    </form>
    <button class="palette-hint" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true,bubbles:true}))" aria-label="Open command palette">
      <kbd>Ctrl</kbd><kbd>K</kbd>
    </button>
  </header>
  <main>
    <section class="admin-form">
      <h2>New Post</h2>
      <form id="upload-form">
        <label>Caption<br>
          <textarea name="caption" placeholder="Caption (optional)"></textarea>
        </label><br>
        <label>Image<br>
          <input type="file" name="image" accept="image/jpeg,image/png,image/webp" required>
        </label><br>
        <button type="submit">Upload</button>
        <div id="upload-status"></div>
      </form>
    </section>

    <section>
      <h2>Posts</h2>
      <div id="posts-list"
           hx-get="/htmx/admin/posts"
           hx-trigger="load">
        Loading...
      </div>
    </section>
  </main>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('upload-form');
  const status = document.getElementById('upload-status');
  const btn = form.querySelector('button[type=submit]');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const fileInput = form.querySelector('input[type=file]');
    const file = fileInput.files[0];
    if (!file) return;

    btn.disabled = true;
    status.textContent = 'Converting…';

    let blob;
    try {
      blob = await new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/webp', 0.85);
        };
        img.onerror = reject;
        img.src = url;
      });
    } catch (_) {
      blob = file; // fallback: send original if canvas conversion fails
    }

    const fd = new FormData(form);
    fd.set('image', blob, 'image.webp');

    status.textContent = 'Uploading…';
    try {
      const resp = await fetch('/api/admin/posts', { method: 'POST', body: fd });
      if (!resp.ok) { status.textContent = 'Upload failed (' + resp.status + ')'; btn.disabled = false; return; }
      const html = await resp.text();
      document.getElementById('posts-list').insertAdjacentHTML('afterbegin', html);
      form.reset();
      status.textContent = '';
    } catch (_) {
      status.textContent = 'Network error';
    } finally {
      btn.disabled = false;
    }
  });
});
</script>
</body>
</html>
